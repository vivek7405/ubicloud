services:
  postgres:
    image: postgres:15.8
    container_name: ubicloud-postgres
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  assets-builder:
    image: node:24.6-alpine3.21
    container_name: ubicloud-assets-builder
    working_dir: /app
    volumes:
      - ../:/app
    command: sh -c "npm install && npm run prod"

  db-migrator:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: ubicloud-db-migrator
    depends_on:
      postgres:
        condition: service_healthy
      assets-builder:
        condition: service_completed_successfully
    env_file: .env
    command: bundle exec rake dev_up
    volumes:
      - ../:/app

  app:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: ubicloud-app
    depends_on:
      db-migrator:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - 3000:3000
    command: foreman start
    volumes:
      - ../:/app
    develop:
      watch:
        - path: ../
          target: /app
          action: sync
          ignore:
            - .git/
            - node_modules/
            - tmp/
            - log/
            - postgres/
        - path: ../Gemfile
          action: rebuild
        - path: ../Gemfile.lock
          action: rebuild

volumes:
  postgres:
